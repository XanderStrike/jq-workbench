<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jq Workbench</title>
    <script src="jq.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background-color: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #2d2d2d;
            padding: 1rem;
            border-bottom: 1px solid #404040;
        }

        .header h1 {
            color: #61dafb;
            font-size: 1.5rem;
            font-weight: normal;
        }

        .container {
            display: flex;
            flex: 1;
            gap: 1rem;
            padding: 1rem;
            overflow: hidden;
        }

        .input-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            flex: 1;
        }

        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel {
            background-color: #2d2d2d;
            border: 1px solid #404040;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background-color: #3a3a3a;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #404040;
            font-size: 0.9rem;
            color: #a0a0a0;
        }

        .panel-content {
            flex: 1;
            padding: 0;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            color: #e0e0e0;
            border: none;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        #queryInput {
            background-color: #1a1a1a;
            color: #61dafb;
            border: none;
            padding: 0.75rem 1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            outline: none;
            border-bottom: 1px solid #404040;
        }

        #resultOutput {
            background-color: #1a1a1a;
            color: #e0e0e0;
            padding: 1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            overflow-y: auto;
            flex: 1;
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #51cf66;
        }

        .json-input {
            flex: 1;
        }

        .query-input {
            flex: 0 0 auto;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>jq Workbench</h1>
    </div>

    <div class="container">
        <div class="input-panel">
            <div class="panel json-input">
                <div class="panel-header">JSON Input</div>
                <div class="panel-content">
                    <textarea id="jsonInput" placeholder='{"example": "data", "array": [1, 2, 3]}'></textarea>
                </div>
            </div>

            <div class="panel query-input">
                <div class="panel-header">jq Query</div>
                <input type="text" id="queryInput" placeholder="." value="{name, age, city: .city | ascii_upcase, hobbies: .hobbies[:2]}">
            </div>
        </div>

        <div class="output-panel">
            <div class="panel">
                <div class="panel-header">Output</div>
                <div id="resultOutput"></div>
            </div>
        </div>
    </div>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const queryInput = document.getElementById('queryInput');
        const resultOutput = document.getElementById('resultOutput');

        // Set initial example data
        jsonInput.value = JSON.stringify({
            "name": "John Doe",
            "age": 30,
            "city": "New York",
            "hobbies": ["reading", "coding", "hiking"],
            "address": {
                "street": "123 Main St",
                "zip": "10001"
            }
        }, null, 2);

        let jqReady = false;
        let jqModule = null;

        // Initialize jq
        function initializeJQ() {
            if (typeof jq !== 'undefined') {
                jq.then(module => {
                    jqReady = true;
                    jqModule = module;
                    executeJQ();
                }).catch(error => {
                    resultOutput.textContent = `Error: ${error.message}`;
                    resultOutput.className = 'error';
                });
            } else {
                resultOutput.textContent = 'Error: jq library not loaded';
                resultOutput.className = 'error';
            }
        }

        function executeJQ() {
            if (!jqReady) {
                resultOutput.textContent = 'Loading jq...';
                return;
            }

            const jsonText = jsonInput.value;
            const query = queryInput.value || '.';

            try {
                // Parse JSON to validate it
                const jsonData = JSON.parse(jsonText);

                // Execute jq query using the loaded module
                const result = jqModule.json(jsonData, query);

                // Format and display result
                if (typeof result === 'object') {
                    resultOutput.textContent = JSON.stringify(result, null, 2);
                } else {
                    resultOutput.textContent = result;
                }
                resultOutput.className = 'success';
            } catch (error) {
                resultOutput.textContent = `Error: ${error.message}`;
                resultOutput.className = 'error';
            }
        }

        // Real-time execution
        let timeout;
        function executeWithDelay() {
            clearTimeout(timeout);
            timeout = setTimeout(executeJQ, 300); // 300ms delay
        }

        // Event listeners for real-time updates
        jsonInput.addEventListener('input', executeWithDelay);
        queryInput.addEventListener('input', executeWithDelay);

        // Initialize jq when the page loads
        window.addEventListener('load', initializeJQ);
    </script>
</body>
</html>
